name: Daily Rates Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Remove snap remnants and install Chrome
        run: |
          # Полностью удаляем snap firefox и geckodriver, чтобы Selenium не путался
          sudo snap remove firefox 2>/dev/null || true
          sudo snap remove geckodriver 2>/dev/null || true
          sudo rm -f /snap/bin/geckodriver
          # Устанавливаем Chrome
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python dependencies
        run: pip install selenium

      - name: Fetch rates and update database
        run: python ci_update_rates.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exchanger.db
          git diff --staged --quiet || git commit -m "Обновление курсов валют [skip ci]"
          git push
