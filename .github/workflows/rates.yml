name: Daily Rates Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Remove snap Firefox, snap geckodriver and install deb Firefox
        run: |
          # Полностью удаляем snap Firefox
          sudo snap remove firefox 2>/dev/null || true
          # Удаляем snap geckodriver (если есть)
          sudo snap remove geckodriver 2>/dev/null || true
          # Очищаем PATH от snap, чтобы Selenium Manager не видел старый драйвер
          export PATH=$(echo $PATH | tr ':' '\n' | grep -v '/snap/bin' | tr '\n' ':')
          # Добавляем PPA от Mozilla с deb-пакетами Firefox
          sudo add-apt-repository ppa:mozillateam/ppa -y
          sudo apt-get update
          sudo apt-get install -y firefox
          # Убедимся, что Firefox действительно установлен и доступен
          which firefox && firefox --version

      - name: Install Python dependencies
        run: pip install selenium

      - name: Fetch rates and update database
        env:
          FIREFOX_BINARY: /usr/bin/firefox
        run: python ci_update_rates.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exchanger.db
          git diff --staged --quiet || git commit -m "Обновление курсов валют [skip ci]"
          git push
