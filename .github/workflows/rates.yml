name: Daily Rates Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Firefox from PPA (no snap)
        run: |
          # Удаляем snap-версии, если есть
          sudo snap remove firefox 2>/dev/null || true
          sudo snap remove geckodriver 2>/dev/null || true
          sudo rm -f /snap/bin/geckodriver
          # Добавляем PPA и устанавливаем обычный Firefox
          sudo add-apt-repository ppa:mozillateam/ppa -y
          sudo apt-get update
          sudo apt-get install -y firefox
          # Проверяем, что Firefox на месте
          which firefox && firefox --version

      - name: Install Python dependencies
        run: pip install selenium

      - name: Fetch rates and update database
        run: python exchanger.py --fetch-rates --headless

      - name: Upload debug screenshots (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            debug_before_button_*.png
            debug_before_input_*.png
            error_final.png
            captcha_detected.png

      - name: Commit and push updated database
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exchanger.db rates.json
          git diff --staged --quiet || git commit -m "Обновление курсов валют [skip ci]"
          git push
