name: Daily Rates Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Firefox from PPA (no snap)
        run: |
          sudo snap remove firefox 2>/dev/null || true
          sudo snap remove geckodriver 2>/dev/null || true
          sudo rm -f /snap/bin/geckodriver
          sudo add-apt-repository ppa:mozillateam/ppa -y
          sudo apt-get update
          sudo apt-get install -y firefox
          echo "=== Проверка установки Firefox ==="
          which firefox || echo "firefox не найден в PATH"
          ls -l /usr/bin/firefox || echo "/usr/bin/firefox не существует"
          firefox --version 2>/dev/null || echo "firefox --version не сработал"
          # Найдём все возможные бинарники firefox
          find / -name "firefox" -type f 2>/dev/null | head -5

      - name: Install Python dependencies
        run: pip install selenium

      - name: Fetch rates and update database
        env:
          FIREFOX_BINARY: /usr/bin/firefox
        run: python exchanger.py --fetch-rates --headless

      - name: Upload debug screenshots (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            debug_before_button_*.png
            debug_before_input_*.png
            error_final.png
            captcha_detected.png

      - name: Commit and push updated database
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exchanger.db rates.json
          git diff --staged --quiet || git commit -m "Обновление курсов валют [skip ci]"
          git push
