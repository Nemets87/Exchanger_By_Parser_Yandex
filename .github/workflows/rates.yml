name: Daily Rates Update
 
on:
  schedule:
    - cron: '0 8 * * *'   # каждый день в 8:00 UTC
  workflow_dispatch:        # ручной запуск по кнопке

permissions:
  contents: write           # разрешаем пушить коммиты

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Firefox
        run: |
          sudo apt-get update
          sudo apt-get install -y firefox

      - name: Install Python dependencies
        run: pip install selenium

      - name: Fetch rates and update database
        env:
          FIREFOX_BINARY: /snap/firefox/current/usr/lib/firefox/firefox
        run: python ci_update_rates.py

      - name: Commit and push updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add exchanger.db
          git diff --staged --quiet || git commit -m "Обновление курсов валют [skip ci]"
          git push
