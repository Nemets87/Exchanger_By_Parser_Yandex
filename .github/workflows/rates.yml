name: Update Exchange Rates

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'

jobs:
  fetch-rates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Убедимся, что Firefox установлен (в ubuntu-latest он есть)
      - name: Ensure Firefox is installed
        run: |
          which firefox || sudo apt-get update && sudo apt-get install -y firefox

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch live rates
        env:
          FIREFOX_BINARY: /snap/firefox/current/usr/lib/firefox/firefox
        run: python live_exchanger.py --fetch-rates --headless

      - name: Upload rates artifact
        uses: actions/upload-artifact@v4
        with:
          name: exchange-rates
          path: rates.json
          retention-days: 7
